<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilyane | Tableau de bord créatif</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo-area">LILY<span>tab</span></div>
            <nav class="menu">
                <a href="#" class="active">🏠 Accueil</a>
                <a href="index.html">🎬 LilyTab</a>
            </nav>
        </aside>

        <header class="header">
            <h2 id="userWelcome">Tableau de bord</h2>
        </header>

        <main class="main-content">
            
            <div class="card card-wide">
                <h3>Heure de session</h3>
                <div id="clock">00:00:00</div>
            </div>

            <div class="card">
                <h3>Progression des objectifs</h3>
                <div class="stat-container">
                    <div id="progression" class="stat-circle">0%</div>
                    <div class="progress-bar-bg">
                        <div id="progress-fill" class="progress-bar-fill"></div>
                    </div>
                </div>
                <p id="stat-message">0 tâche accomplie</p>
            </div>

            <div class="card card-notes">
                <div class="note-header">
                    <h3>Bloc-notes rapide</h3>
                    <button class="add-note-btn" id="clearNote">×</button>
                </div>
                <input type="text" class="note-title" id="nTitle" placeholder="Titre de la note">
                <textarea class="note-body" id="nBody" placeholder="Écrivez vos idées ici..."></textarea>
            </div>

            <div class="card card-todo">
                <h3>Liste des tâches</h3>
                <div class="input-row">
                    <input type="text" id="todoInput" placeholder="Ajouter un projet...">
                    <button id="addTodo">Add</button>
                </div>
                <ul id="todoList"></ul>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
